<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Emergency Help · AutoCare</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/shared/app.css">
<link rel="stylesheet" href="/app/shared/inapp.css">
<link rel="stylesheet" href="/app/shared/mobile.css">
<style>
  .em { max-width: 720px; margin: 0 auto; padding: 28px 20px 96px; }
  .em-head { margin-bottom: 28px; }
  .em-head h1 { font-size: clamp(24px,3vw,36px); letter-spacing: -0.025em; margin-bottom: 8px; }
  .em-head h1 em { font-family: var(--font-serif); font-style: italic; font-weight: 400; color: #dc2626; }
  .em-head p { color: var(--paper-500); font-size: var(--fs-sm); }

  .em-search {
    position: relative; margin-bottom: 24px;
  }
  .em-search input {
    width: 100%; padding: 12px 16px 12px 44px;
    border: var(--border-hair); border-radius: var(--r-lg);
    font-size: var(--fs-sm); font-family: inherit; color: var(--ink-900);
    background: var(--paper-0); box-sizing: border-box;
    transition: border-color var(--dur-fast);
  }
  .em-search input:focus { outline: none; border-color: var(--brand-400); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .em-search__icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--paper-400); font-size: 18px; pointer-events: none; }
  .em-no-results { text-align: center; padding: 48px 20px; color: var(--paper-400); display: none; }

  .em-card {
    background: var(--paper-0); border: var(--border-hair); border-radius: var(--r-xl);
    margin-bottom: 12px; overflow: hidden;
    transition: box-shadow var(--dur-fast);
  }
  .em-card:hover { box-shadow: var(--shadow-sm); }
  .em-card--open { border-color: var(--paper-200); box-shadow: var(--shadow-sm); }

  .em-card__header {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 20px; cursor: pointer; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .em-card__icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .em-card__title { flex: 1; font-weight: 700; font-size: var(--fs-md); color: var(--ink-900); }
  .em-card__chevron {
    font-size: 18px; color: var(--paper-400); transition: transform 0.2s ease; flex-shrink: 0;
  }
  .em-card--open .em-card__chevron { transform: rotate(180deg); }

  .em-card__body {
    display: none; padding: 0 20px 20px 20px;
  }
  .em-card--open .em-card__body { display: block; }

  .em-steps { list-style: none; padding: 0; margin: 0; counter-reset: steps; }
  .em-steps li {
    counter-increment: steps;
    display: flex; gap: 14px; align-items: flex-start;
    padding: 10px 0; border-bottom: 1px solid var(--paper-100);
  }
  .em-steps li:last-child { border-bottom: none; padding-bottom: 0; }
  .em-steps li::before {
    content: counter(steps);
    display: flex; align-items: center; justify-content: center;
    min-width: 26px; height: 26px; border-radius: 50%;
    font-size: 12px; font-weight: 800; font-family: var(--font-mono);
    flex-shrink: 0; margin-top: 1px;
  }
  .em-steps li span { font-size: var(--fs-sm); color: var(--ink-700); line-height: 1.6; }
  .em-steps li strong { color: var(--ink-900); }

  .em-tip {
    margin-top: 14px; padding: 12px 14px;
    border-radius: 10px; font-size: var(--fs-xs); line-height: 1.5;
  }

  /* colour themes */
  .theme-red   .em-card__icon { background: #fee2e2; }
  .theme-red   .em-steps li::before { background: #fee2e2; color: #dc2626; }
  .theme-red   .em-tip { background: #fff7f7; border-left: 3px solid #fca5a5; color: #7f1d1d; }

  .theme-amber .em-card__icon { background: #fef3c7; }
  .theme-amber .em-steps li::before { background: #fef3c7; color: #d97706; }
  .theme-amber .em-tip { background: #fffbeb; border-left: 3px solid #fcd34d; color: #78350f; }

  .theme-blue  .em-card__icon { background: #dbeafe; }
  .theme-blue  .em-steps li::before { background: #dbeafe; color: #1d4ed8; }
  .theme-blue  .em-tip { background: #eff6ff; border-left: 3px solid #93c5fd; color: #1e3a8a; }

  .theme-green .em-card__icon { background: #dcfce7; }
  .theme-green .em-steps li::before { background: #dcfce7; color: #15803d; }
  .theme-green .em-tip { background: #f0fdf4; border-left: 3px solid #86efac; color: #14532d; }

  .theme-orange .em-card__icon { background: #ffedd5; }
  .theme-orange .em-steps li::before { background: #ffedd5; color: #ea580c; }
  .theme-orange .em-tip { background: #fff7ed; border-left: 3px solid #fdba74; color: #7c2d12; }

  .theme-purple .em-card__icon { background: #ede9fe; }
  .theme-purple .em-steps li::before { background: #ede9fe; color: #7c3aed; }
  .theme-purple .em-tip { background: #f5f3ff; border-left: 3px solid #c4b5fd; color: #4c1d95; }
</style>
</head>
<body>
<div class="app-shell">

<header class="appbar">
  <div class="appbar__inner">
    <a class="brand" href="/app/index.html"><span class="brand__mark">A</span><span class="hide-mobile">AutoCare</span></a>
    <div class="appbar__spacer"></div>
    <a class="btn btn--ghost btn--sm" href="javascript:history.back()">← Back</a>
  </div>
</header>

<main class="em">
  <div class="em-head am-rise">
    <h1>Emergency <em>Help</em></h1>
    <p>Step-by-step guides for common roadside emergencies. Stay calm, follow the steps.</p>
  </div>

  <div class="em-search am-rise" data-d="1">
    <span class="em-search__icon">🔍</span>
    <input type="search" id="em-search" placeholder="Search guides — tyre, battery, oil…" autocomplete="off">
  </div>

  <div id="em-cards"></div>
  <div class="em-no-results" id="em-empty">No guides match your search.</div>
</main>

</div>

<script src="/app/shared/icons.js"></script>
<script>
const GUIDES = [
  {
    icon: '🛞', title: 'How to Change a Tyre', theme: 'theme-amber',
    steps: [
      '<strong>Find a safe spot.</strong> Pull completely off the road onto a flat, stable surface. Turn on hazard lights.',
      '<strong>Secure the car.</strong> Apply the handbrake, place wheel wedges or stones behind the other tyres.',
      '<strong>Loosen the lug nuts.</strong> Use the wheel wrench to crack each nut anti-clockwise — do this <em>before</em> jacking up.',
      '<strong>Jack the car up.</strong> Place the jack under the vehicle\'s jack point (check your manual). Raise until the flat tyre is ~15 cm off the ground.',
      '<strong>Swap the tyre.</strong> Remove lug nuts fully, pull off the flat, mount the spare, hand-tighten the nuts in a star pattern.',
      '<strong>Lower and torque.</strong> Lower the car, fully tighten the lug nuts, check spare pressure. Drive to a garage soon — spares are temporary.'
    ],
    tip: '⚠️ Never get under a car supported only by a jack. Keep the flat tyre under the car as a safety backup while working.'
  },
  {
    icon: '🔋', title: 'How to Jump Start a Car Battery', theme: 'theme-red',
    steps: [
      '<strong>Position the vehicles.</strong> Park the working car nose-to-nose or side-by-side so cables reach both batteries. Turn off both engines.',
      '<strong>Connect red cables.</strong> Clamp one red cable to the dead battery (+), the other red end to the good battery (+).',
      '<strong>Connect black cables.</strong> Clamp one black cable to the good battery (−), the other black end to an unpainted metal part of the dead car\'s engine (not the dead battery).',
      '<strong>Start the working car.</strong> Run it for 2–3 minutes to charge the dead battery slightly.',
      '<strong>Start the dead car.</strong> Try to start it. If successful, remove cables in reverse order (black first, then red). Drive for at least 20 minutes to recharge.'
    ],
    tip: '⚡ Never connect black to the dead battery terminal — sparks near a battery can ignite hydrogen gas. Always use an unpainted metal ground.'
  },
  {
    icon: '🛢️', title: 'How to Check and Top Up Engine Oil', theme: 'theme-green',
    steps: [
      '<strong>Cool the engine.</strong> Park on level ground, switch off, wait at least 5 minutes for oil to settle.',
      '<strong>Locate and read the dipstick.</strong> Pull the dipstick out, wipe clean, reinsert fully, pull out again. Oil level should be between the MIN and MAX marks.',
      '<strong>Check oil colour.</strong> Healthy oil is amber/brown. Black or gritty oil needs an oil change. Milky oil means coolant contamination — see a mechanic immediately.',
      '<strong>Top up if needed.</strong> Remove the oil filler cap (oil can symbol), add the correct grade in small amounts (check owner\'s manual). Recheck with dipstick. Do not overfill.'
    ],
    tip: '🔧 Use the exact oil grade specified in your owner\'s manual. Mixing grades is okay in an emergency but get a proper oil change soon.'
  },
  {
    icon: '🌡️', title: 'What to Do if Engine Overheats', theme: 'theme-orange',
    steps: [
      '<strong>Turn off AC immediately.</strong> This reduces engine load. If temperature keeps rising, turn the heater to max — it draws heat away from the engine.',
      '<strong>Pull over safely.</strong> Find a safe spot and stop the car. Do not keep driving — severe engine damage happens fast.',
      '<strong>Turn off the engine.</strong> Wait at least 15–20 minutes before opening the bonnet. Never open the radiator cap on a hot engine — pressurised coolant will spray out.',
      '<strong>Check coolant level.</strong> Once cool, check the coolant reservoir. If empty, you can add water as a temporary fix — do not add cold water to a hot engine.',
      '<strong>Call for help.</strong> If the car overheated severely or you see steam/smoke, do not drive it. Call a mechanic or tow service.'
    ],
    tip: '🚨 Steam coming from the bonnet = stop immediately. Coolant on the ground = likely a hose burst. Both need a tow, not a drive.'
  },
  {
    icon: '⚡', title: 'How to Change a Fuse', theme: 'theme-blue',
    steps: [
      '<strong>Identify the fuse box.</strong> Most cars have two fuse boxes: one under the dashboard (driver\'s side) and one in the engine bay. Check your manual for location.',
      '<strong>Find the blown fuse.</strong> Use the diagram on the fuse box cover to locate the fuse for the failed circuit. A blown fuse has a broken wire inside — use a torch to check.',
      '<strong>Remove the blown fuse.</strong> Use the plastic fuse puller (usually stored in the fuse box) or a pair of flat-nose pliers. Never use metal tools near live circuits.',
      '<strong>Install the correct replacement.</strong> Match the amperage exactly (same colour, same number). Push the new fuse firmly into place. Test the circuit.'
    ],
    tip: '🔌 If the replacement fuse blows again immediately, there is a short circuit. Do not keep replacing fuses — this needs a proper electrical diagnosis.'
  },
  {
    icon: '🛑', title: 'What to Do if Brakes Fail', theme: 'theme-purple',
    steps: [
      '<strong>Stay calm and pump the brakes.</strong> Rapidly pump the brake pedal — this can rebuild hydraulic pressure in older systems and may restore partial braking.',
      '<strong>Use the handbrake gradually.</strong> Apply the handbrake slowly and steadily. Yanking it suddenly can lock the rear wheels and cause a spin.',
      '<strong>Downshift.</strong> Drop gears one at a time to use engine braking. In an automatic, shift to L or 2. This will slow the car progressively.',
      '<strong>Find a safe exit.</strong> Steer toward a run-off road, gravel, grass, or an uphill slope. If nothing else is available, a guardrail is better than oncoming traffic.'
    ],
    tip: '🆘 Sound your horn and flash headlights to warn other drivers. After stopping, do not drive the car. Call a tow truck — brake failure must be fully diagnosed before driving again.'
  }
];

const container = document.getElementById('em-cards');
const noResults = document.getElementById('em-empty');

function buildCard(g, idx) {
  const card = document.createElement('div');
  card.className = `em-card ${g.theme} am-rise`;
  card.dataset.idx = idx;
  card.dataset.keywords = (g.title + ' ' + g.steps.join(' ') + ' ' + (g.tip || '')).toLowerCase();

  card.innerHTML = `
    <div class="em-card__header">
      <div class="em-card__icon">${g.icon}</div>
      <div class="em-card__title">${g.title}</div>
      <div class="em-card__chevron">▾</div>
    </div>
    <div class="em-card__body">
      <ol class="em-steps">
        ${g.steps.map(s => `<li><span>${s}</span></li>`).join('')}
      </ol>
      ${g.tip ? `<div class="em-tip">${g.tip}</div>` : ''}
    </div>`;

  card.querySelector('.em-card__header').addEventListener('click', () => {
    const isOpen = card.classList.contains('em-card--open');
    // Close all others
    document.querySelectorAll('.em-card--open').forEach(c => c.classList.remove('em-card--open'));
    if (!isOpen) card.classList.add('em-card--open');
  });

  return card;
}

GUIDES.forEach((g, i) => container.appendChild(buildCard(g, i)));

// Search
document.getElementById('em-search').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  let visible = 0;
  document.querySelectorAll('.em-card').forEach(card => {
    const match = !q || card.dataset.keywords.includes(q);
    card.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  noResults.style.display = visible === 0 ? 'block' : 'none';
});
</script>
</body>
</html>
