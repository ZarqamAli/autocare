<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Find a Workshop Â· AutoCare</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/shared/app.css">
<link rel="stylesheet" href="/app/shared/inapp.css">
<link rel="stylesheet" href="/app/shared/mobile.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  * { box-sizing: border-box; }
  body { overflow: hidden; }
  .nb-shell { display: flex; flex-direction: column; height: 100vh; }
  .nb-appbar { flex-shrink: 0; }

  .nb-filter { flex-shrink: 0; background: var(--paper-0); border-bottom: var(--border-hair); padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .nb-filter label { font-size: var(--fs-xs); font-weight: 700; color: var(--paper-500); white-space: nowrap; }
  .nb-filter select { font-size: var(--fs-sm); padding: 6px 10px; border: var(--border-hair); border-radius: 8px; background: var(--paper-0); color: var(--ink-900); cursor: pointer; }
  .nb-count { font-size: var(--fs-xs); color: var(--paper-400); margin-left: auto; }

  .nb-body { flex: 1; display: flex; overflow: hidden; }

  /* Sidebar */
  .nb-sidebar {
    width: 320px; flex-shrink: 0; overflow-y: auto;
    border-right: var(--border-hair); background: var(--paper-0);
  }
  @media (max-width: 700px) { .nb-sidebar { display: none; } }
  .nb-item {
    padding: 14px 16px; border-bottom: 1px solid var(--paper-100);
    cursor: pointer; transition: background var(--dur-fast);
  }
  .nb-item:hover { background: var(--paper-50); }
  .nb-item--active { background: var(--brand-50); border-left: 3px solid var(--brand-500); }
  .nb-item__name { font-weight: 700; font-size: var(--fs-sm); color: var(--ink-900); margin-bottom: 3px; }
  .nb-item__sub { font-size: var(--fs-xs); color: var(--paper-500); line-height: 1.4; }
  .nb-item__dist { font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--brand-600); margin-top: 4px; }
  .nb-empty { padding: 40px 16px; text-align: center; color: var(--paper-400); font-size: var(--fs-sm); }

  /* Map */
  .nb-map { flex: 1; }
  #map { width: 100%; height: 100%; }

  /* Leaflet popup overrides */
  .lf-popup { min-width: 220px; }
  .lf-popup__name { font-weight: 800; font-size: 15px; color: var(--ink-900); margin-bottom: 6px; }
  .lf-popup__row { font-size: 13px; color: #444; margin-bottom: 3px; line-height: 1.4; }
  .lf-popup__hours { font-size: 12px; color: #666; margin-bottom: 8px; }
  .lf-popup__dist { font-size: 12px; font-weight: 700; color: var(--brand-600); margin-bottom: 8px; }
  .lf-popup__dir { display: inline-block; padding: 6px 14px; background: var(--brand-600); color: #fff; border-radius: 8px; font-size: 13px; font-weight: 700; text-decoration: none; margin-top: 4px; }
  .lf-popup__dir:hover { background: var(--brand-700); }

  .nb-locate-btn {
    position: absolute; bottom: 24px; right: 16px; z-index: 1000;
    background: var(--paper-0); border: var(--border-hair); border-radius: 10px;
    padding: 8px 14px; font-size: var(--fs-sm); font-weight: 600; cursor: pointer;
    box-shadow: var(--shadow-sm); color: var(--brand-700);
    display: flex; align-items: center; gap: 6px;
  }
</style>
</head>
<body>
<div class="nb-shell">

<header class="appbar nb-appbar">
  <div class="appbar__inner">
    <a class="brand" href="/app/index.html"><span class="brand__mark">A</span><span class="hide-mobile">AutoCare</span></a>
    <div class="appbar__spacer"></div>
    <span style="font-weight:700;font-size:var(--fs-sm);color:var(--ink-900);">Find a Workshop</span>
    <div class="appbar__spacer"></div>
    <a class="btn btn--ghost btn--sm" href="javascript:history.back()">â† Back</a>
  </div>
</header>

<div class="nb-filter">
  <label for="city-filter">City:</label>
  <select id="city-filter">
    <option value="">All cities</option>
  </select>
  <span class="nb-count" id="nb-count"></span>
</div>

<div class="nb-body">
  <aside class="nb-sidebar" id="nb-sidebar">
    <div class="nb-empty">Loading workshopsâ€¦</div>
  </aside>
  <div class="nb-map" style="position:relative;">
    <div id="map"></div>
    <button class="nb-locate-btn" id="locate-btn" title="Center on my location">ðŸ“ My location</button>
  </div>
</div>

</div><!-- nb-shell -->

<script src="/app/shared/icons.js" defer></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
<script type="module">
import { supabase } from '/app/shared/supabase.js';

const LAHORE = [31.5204, 74.3587];
let map, userMarker, userLatLng = null;
let allMechanics = [], filtered = [], markers = [], activeIdx = null;

// â”€â”€ Init map â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
map = L.map('map').setView(LAHORE, 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'Â© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

// â”€â”€ Load data â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const { data: mechanics, error } = await supabase
  .from('mechanic_profiles')
  .select('id, workshop_name, address, city, phone, lat, lng, working_hours, workshop_photo_url')
  .eq('status', 'approved')
  .order('workshop_name');

if (error || !mechanics?.length) {
  document.getElementById('nb-sidebar').innerHTML = '<div class="nb-empty">No approved workshops found.</div>';
  document.getElementById('nb-count').textContent = '0 workshops';
} else {
  allMechanics = mechanics;

  // Populate city filter
  const cities = [...new Set(mechanics.map(m => m.city).filter(Boolean))].sort();
  const sel = document.getElementById('city-filter');
  cities.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });

  sel.addEventListener('change', () => { renderFiltered(); });

  renderFiltered();
}

// â”€â”€ GPS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function requestGPS() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    userLatLng = [pos.coords.latitude, pos.coords.longitude];
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.circleMarker(userLatLng, {
      radius: 10, fillColor: '#2563eb', color: '#fff',
      weight: 3, fillOpacity: 1
    }).addTo(map).bindPopup('<b>You are here</b>');
    map.setView(userLatLng, 13);
    renderFiltered(); // re-sort by distance
  }, () => {});
}

document.getElementById('locate-btn').addEventListener('click', requestGPS);
requestGPS(); // auto-request on load

// â”€â”€ Distance â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function haversineKm([lat1, lon1], [lat2, lon2]) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// â”€â”€ Render â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderFiltered() {
  const city = document.getElementById('city-filter').value;
  filtered = city ? allMechanics.filter(m => m.city === city) : [...allMechanics];

  // Sort: mechanics with coords first, then by distance if user location known
  if (userLatLng) {
    filtered.sort((a, b) => {
      const dA = (a.lat && a.lng) ? haversineKm(userLatLng, [a.lat, a.lng]) : 99999;
      const dB = (b.lat && b.lng) ? haversineKm(userLatLng, [b.lat, b.lng]) : 99999;
      return dA - dB;
    });
  }

  document.getElementById('nb-count').textContent = `${filtered.length} workshop${filtered.length !== 1 ? 's' : ''}`;

  clearMarkers();
  renderMarkers();
  renderSidebar();
}

function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  activeIdx = null;
}

function renderMarkers() {
  filtered.forEach((m, i) => {
    if (!m.lat || !m.lng) return;
    const marker = L.marker([m.lat, m.lng]).addTo(map);
    marker.bindPopup(buildPopup(m), { maxWidth: 280 });
    marker.on('click', () => setActive(i, false));
    markers[i] = marker;
  });

  // Fit bounds if any have coords
  const withCoords = filtered.filter(m => m.lat && m.lng);
  if (withCoords.length && !userLatLng) {
    const bounds = L.latLngBounds(withCoords.map(m => [m.lat, m.lng]));
    map.fitBounds(bounds, { padding: [40, 40] });
  }
}

function buildPopup(m) {
  const dist = (userLatLng && m.lat && m.lng)
    ? `<div class="lf-popup__dist">ðŸ“ ${haversineKm(userLatLng, [m.lat, m.lng]).toFixed(1)} km away</div>` : '';
  const dir = (m.lat && m.lng)
    ? `<a class="lf-popup__dir" href="https://www.google.com/maps/dir/?api=1&destination=${m.lat},${m.lng}" target="_blank" rel="noopener">Get Directions</a>` : '';
  return `<div class="lf-popup">
    <div class="lf-popup__name">${esc(m.workshop_name || 'Workshop')}</div>
    <div class="lf-popup__row">ðŸ“ ${esc(m.address || '')}${m.city ? ', ' + esc(m.city) : ''}</div>
    ${m.phone ? `<div class="lf-popup__row">ðŸ“ž ${esc(m.phone)}</div>` : ''}
    ${m.working_hours ? `<div class="lf-popup__hours">ðŸ• ${esc(m.working_hours)}</div>` : ''}
    ${dist}${dir}
  </div>`;
}

function renderSidebar() {
  const sidebar = document.getElementById('nb-sidebar');
  if (!filtered.length) {
    sidebar.innerHTML = '<div class="nb-empty">No workshops in this city.</div>';
    return;
  }
  sidebar.innerHTML = filtered.map((m, i) => {
    const dist = (userLatLng && m.lat && m.lng)
      ? `<div class="nb-item__dist">${haversineKm(userLatLng, [m.lat, m.lng]).toFixed(1)} km away</div>` : '';
    const noCoords = (!m.lat || !m.lng) ? ' <span style="font-size:10px;color:var(--paper-400);">(no map pin)</span>' : '';
    return `<div class="nb-item" data-i="${i}">
      <div class="nb-item__name">${esc(m.workshop_name || 'Workshop')}${noCoords}</div>
      <div class="nb-item__sub">${esc(m.address || '')}${m.city ? ', ' + esc(m.city) : ''}</div>
      ${m.phone ? `<div class="nb-item__sub">ðŸ“ž ${esc(m.phone)}</div>` : ''}
      ${m.working_hours ? `<div class="nb-item__sub">ðŸ• ${esc(m.working_hours)}</div>` : ''}
      ${dist}
    </div>`;
  }).join('');

  sidebar.querySelectorAll('.nb-item').forEach(el => {
    el.addEventListener('click', () => setActive(+el.dataset.i, true));
  });
}

function setActive(i, fromSidebar) {
  // Highlight sidebar item
  document.querySelectorAll('.nb-item').forEach(el => el.classList.remove('nb-item--active'));
  const el = document.querySelector(`.nb-item[data-i="${i}"]`);
  if (el) { el.classList.add('nb-item--active'); if (fromSidebar) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }

  const m = filtered[i];
  if (!m) return;
  if (markers[i]) {
    if (!fromSidebar) return; // marker click already opens popup via Leaflet
    map.setView([m.lat, m.lng], 15, { animate: true });
    markers[i].openPopup();
  } else if (m.lat && m.lng) {
    map.setView([m.lat, m.lng], 15, { animate: true });
  }
  activeIdx = i;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
<script src="/app/shared/perf.js" defer></script>
</body>
</html>
