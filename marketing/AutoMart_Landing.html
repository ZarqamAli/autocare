<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AutoMart — Pakistan's trust-first car marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          mono: ['Geist Mono', 'ui-monospace', 'monospace'],
          serif: ['Instrument Serif', 'serif']
        },
        colors: {
          ink: { 950:'#05070d', 900:'#0a0e1a', 800:'#101627', 700:'#1a2238', 600:'#2a3450' },
          paper: { 50:'#f8fafc', 100:'#f1f5f9', 200:'#e2e8f0' },
          brand: { 400:'#60a5fa', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8' },
          ok: '#10b981',
          warn: '#f59e0b'
        }
      }
    }
  }
</script>
<script src="https://cdn.tailwindcss.com" defer></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous" defer></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous" defer></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous" defer></script>
<style>
  html, body { background:#05070d; color:#e8ecf5; font-family:'Inter',sans-serif; }
  body { overflow-x: hidden; }
  *::selection { background:#2563eb; color:white; }

  /* ---------- HERO STAGE ---------- */
  .hero-stage {
    position: relative;
    min-height: 100vh;
    background: #05070d;
    overflow: hidden;
    perspective: 1400px;
    isolation: isolate;
  }
  .hero-video {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit: cover;
    transform: scale(1.04) translateZ(0);
    filter: saturate(1.1) brightness(0.9);
    /* Remove filter/transform transitions — they repaint every frame.
       Opacity transition is cheap (compositor-only). */
    transition: opacity 1.8s ease;
    will-change: opacity, transform;
    backface-visibility: hidden;
  }
  /* stage 1: video invisible — solid black cover */
  .hero-stage[data-stage="1"] .hero-video {
    opacity: 0;
  }
  /* stage 2: video fades in over 1.8s, still no text */
  .hero-stage[data-stage="2"] .hero-video {
    opacity: 1;
    filter: saturate(1.15) brightness(0.85);
    transform: scale(1.02);
    transition: opacity 1.8s ease;
  }
  /* stage 3: same video state, text begins */
  .hero-stage[data-stage="3"] .hero-video {
    opacity: 1;
    filter: saturate(1.15) brightness(0.85);
    transform: scale(1.02);
  }
  /* color grade overlay */
  .hero-grade {
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(5,7,13,0.35) 0%, rgba(5,7,13,0.15) 30%, rgba(5,7,13,0.4) 70%, rgba(5,7,13,0.9) 100%),
      radial-gradient(ellipse 80% 60% at 50% 50%, transparent 0%, rgba(5,7,13,0.4) 100%),
      linear-gradient(180deg, rgba(37,99,235,0.06), rgba(37,99,235,0) 40%);
    mix-blend-mode: multiply;
    pointer-events:none;
    transition: opacity 1.4s ease;
  }
  .hero-darken {
    position:absolute; inset:0;
    background: rgba(5,7,13, 0);
    transition: background 1.6s cubic-bezier(.22,.7,.2,1);
    pointer-events:none;
  }
  .hero-stage[data-stage="3"] .hero-darken {
    background: rgba(5,7,13, 0.18);
  }

  /* film grain */
  .hero-grain {
    position:absolute; inset:0; pointer-events:none;
    background-image:
      radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 3px 3px, 5px 5px;
    background-position: 0 0, 1px 2px;
    opacity: 0.6;
    mix-blend-mode: overlay;
  }

  /* lens flare */
  .lens-flare {
    position:absolute; pointer-events:none;
    width: 60vw; height: 60vw; max-width: 800px; max-height: 800px;
    border-radius: 50%;
    filter: blur(60px);
    background: radial-gradient(circle, rgba(180,210,255,0.28), rgba(37,99,235,0.12) 35%, transparent 65%);
    mix-blend-mode: screen;
    animation: lensDrift 14s ease-in-out infinite;
  }
  .lens-flare.one { top:10%; left:60%; animation-delay: 0s; }
  .lens-flare.two { bottom:15%; left:15%; animation-delay: -6s; }
  @keyframes lensDrift {
    0%,100% { transform: translate(0,0) scale(1); opacity: 0.5; }
    50%     { transform: translate(40px, -30px) scale(1.15); opacity: 0.85; }
  }

  /* hero stage progressive fade-in: trust ribbon */
  .stage-fade { opacity:0; transform: translateY(10px); transition: opacity 1.2s ease, transform 1.2s ease; }
  .hero-stage[data-stage="3"] .stage-fade { opacity:1; transform: translateY(0); }

  /* word reveal */
  .word { display:inline-block; opacity:0; filter: blur(14px); transform: translateY(28px); }
  .hero-stage[data-stage="3"] .word { animation: wordIn 1.1s cubic-bezier(.22,.7,.2,1) forwards; }
  @keyframes wordIn {
    to { opacity:1; filter: blur(0); transform: translateY(0); }
  }
  .word.serif {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    color: #93c5fd;
    letter-spacing: -0.04em;
  }

  /* Road perspective grid */
  .road-grid {
    position:absolute; inset:auto 0 0 0; height: 70vh;
    transform-style: preserve-3d;
    transform: rotateX(70deg) translateZ(0);
    transform-origin: center bottom;
    background-image:
      linear-gradient(to right, rgba(96,165,250,0.18) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(96,165,250,0.18) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse 80% 70% at 50% 100%, black 30%, transparent 80%);
    animation: roadScroll 4s linear infinite;
  }
  @keyframes roadScroll {
    from { background-position: 0 0, 0 0; }
    to   { background-position: 0 80px, 0 80px; }
  }

  /* Vignette stars */
  .star-field {
    position:absolute; inset:0;
    background-image:
      radial-gradient(1px 1px at 20% 18%, #c5d6ff 99%, transparent),
      radial-gradient(1px 1px at 80% 12%, #9bbcff 99%, transparent),
      radial-gradient(1px 1px at 35% 30%, #b0c8ff 99%, transparent),
      radial-gradient(1px 1px at 65% 22%, #ffffff 99%, transparent),
      radial-gradient(1.5px 1.5px at 12% 8%, #6c8cff 99%, transparent),
      radial-gradient(1px 1px at 90% 35%, #b6cbff 99%, transparent);
    opacity: 0.45;
  }
  .vignette {
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 50%, transparent 0%, rgba(5,7,13,0.65) 80%),
      linear-gradient(180deg, rgba(5,7,13,0.6) 0%, transparent 30%, transparent 70%, rgba(5,7,13,0.9) 100%);
    pointer-events: none;
  }

  /* Headlight twin glow */
  .headlight {
    position:absolute;
    width: 60vw; height: 60vw; max-width: 900px; max-height: 900px;
    border-radius: 50%;
    filter: blur(60px);
    background: radial-gradient(circle, rgba(160,200,255,0.7) 0%, rgba(37,99,235,0.4) 30%, transparent 60%);
    mix-blend-mode: screen;
    transform: translate(-50%, -50%);
    opacity: 0;
    animation: headlightPulse 6s ease-in-out infinite;
  }
  .headlight.l { left: 44%; top: 62%; animation-delay: 0.1s;}
  .headlight.r { left: 56%; top: 62%; animation-delay: 0.2s;}
  @keyframes headlightPulse {
    0%, 100% { opacity: 0.55; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.95; transform: translate(-50%, -50%) scale(1.08); }
  }

  /* Car approach */
  .car-approach {
    position:absolute; left:50%; bottom: 12vh;
    transform: translateX(-50%) translateZ(0);
    width: clamp(420px, 70vw, 980px);
    animation: carApproach 4.5s cubic-bezier(.22,.7,.2,1) 0.2s both;
    filter: drop-shadow(0 40px 80px rgba(37,99,235,0.45));
  }
  @keyframes carApproach {
    0%   { transform: translateX(-50%) scale(0.18) translateY(80px); opacity: 0; filter: blur(8px) drop-shadow(0 0 0 transparent); }
    25%  { opacity: 1; filter: blur(4px) drop-shadow(0 30px 60px rgba(37,99,235,0.4)); }
    100% { transform: translateX(-50%) scale(1) translateY(0); opacity: 1; filter: blur(0) drop-shadow(0 40px 80px rgba(37,99,235,0.45)); }
  }

  /* Smoke layers */
  .smoke {
    position:absolute; bottom:-10%; left:50%;
    width: 120vw; height: 60vh;
    transform: translateX(-50%);
    pointer-events:none;
  }
  .smoke .puff {
    position:absolute; bottom:0;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(180,200,255,0.18) 0%, rgba(37,99,235,0.05) 40%, transparent 70%);
    filter: blur(40px);
    mix-blend-mode: screen;
    animation: drift 14s ease-in-out infinite;
  }
  .smoke .puff:nth-child(1){ left:20%; animation-delay: 0s; }
  .smoke .puff:nth-child(2){ left:50%; animation-delay: -3s; transform: translateX(-50%); }
  .smoke .puff:nth-child(3){ left:80%; animation-delay: -7s; transform: translateX(-100%); }
  .smoke .puff:nth-child(4){ left:35%; animation-delay: -10s; }
  .smoke .puff:nth-child(5){ left:65%; animation-delay: -5s; }
  @keyframes drift {
    0%   { transform: translate(0, 60%) scale(0.6); opacity: 0; }
    20%  { opacity: 0.9; }
    100% { transform: translate(40px, -20%) scale(1.4); opacity: 0; }
  }

  /* Floor reflection */
  .floor-reflect {
    position:absolute; left:50%; bottom: 4vh;
    width: 80vw; height: 24vh;
    transform: translateX(-50%);
    background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(37,99,235,0.35), transparent 70%);
    filter: blur(30px);
    mix-blend-mode: screen;
  }

  /* Reveal animations */
  .reveal-up { opacity:0; transform: translateY(24px); animation: revealUp 1s cubic-bezier(.22,.7,.2,1) forwards; }
  .reveal-up.d1 { animation-delay: 2.4s; }
  .reveal-up.d2 { animation-delay: 2.6s; }
  .reveal-up.d3 { animation-delay: 2.8s; }
  .reveal-up.d4 { animation-delay: 3.0s; }
  .reveal-up.d5 { animation-delay: 3.2s; }
  @keyframes revealUp { to { opacity:1; transform: translateY(0); } }
  @keyframes typing { 0%,90%,100% { opacity: 1; } }
  @keyframes blink { 50% { opacity: 0; } }

  /* Blink scroll cue */
  @keyframes scrollCue {
    0%, 100% { transform: translateY(0); opacity: 0.5; }
    50% { transform: translateY(8px); opacity: 1; }
  }

  /* Marquee */
  .marquee {
    display:flex; gap:14px; width:max-content;
    animation: marquee 40s linear infinite;
  }
  .marquee.reverse { animation-direction: reverse; }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .marquee-mask {
    mask-image: linear-gradient(90deg, transparent, black 6%, black 94%, transparent);
  }

  /* Card tilt */
  .tilt-card { transition: transform 0.4s cubic-bezier(.2,.8,.2,1), box-shadow 0.4s; transform-style: preserve-3d; }
  .tilt-card:hover { transform: translateY(-6px) rotateX(2deg) rotateY(-3deg); box-shadow: 0 30px 60px -20px rgba(37,99,235,0.35); }

  /* Number counter shimmer */
  .num-shine {
    background: linear-gradient(90deg, #e8ecf5 0%, #fff 50%, #e8ecf5 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    animation: shine 3s linear infinite;
  }
  @keyframes shine { from { background-position: 200% 0; } to { background-position: -200% 0; } }

  /* Section reveal on scroll */
  .scroll-reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.8s, transform 0.8s; }
  .scroll-reveal.in { opacity:1; transform: translateY(0); }

  /* Filter chip floating */
  .chip {
    display:inline-flex; align-items:center; gap:8px;
    padding: 10px 18px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: #d8dfee;
    font-weight: 500;
    backdrop-filter: blur(10px);
    white-space: nowrap;
    font-size: 14px;
  }
  .chip.live { border-color: rgba(37,99,235,0.5); background: rgba(37,99,235,0.12); color:#cfe0ff; }

  /* Listing card video placeholder */
  .video-slot {
    position:relative; overflow:hidden; border-radius: 14px;
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.04) 0 12px, rgba(255,255,255,0.02) 12px 24px),
      linear-gradient(180deg, #1a2238, #0a0e1a);
  }
  .video-slot::after {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,0.5));
  }
  .video-slot .label {
    position:absolute; left:12px; bottom:12px;
    font-family:'Geist Mono', monospace; font-size:10px; letter-spacing:0.08em;
    color:#7a8aa8; background:rgba(0,0,0,0.5); padding:4px 8px; border-radius: 4px;
    text-transform:uppercase; z-index:2;
  }

  /* Price gauge */
  .gauge {
    --p: 0.62;
    height: 14px; width:100%;
    background: linear-gradient(90deg, #ef4444, #f59e0b 50%, #10b981 100%);
    border-radius: 999px;
    position:relative;
  }
  .gauge::before {
    content:''; position:absolute; top:50%;
    left: calc(var(--p) * 100%);
    transform: translate(-50%, -50%);
    width: 22px; height: 22px;
    border-radius: 50%;
    background: white;
    border: 3px solid #0a0e1a;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.5), 0 6px 20px rgba(0,0,0,0.4);
  }

  /* CTA shine */
  .btn-primary {
    background: linear-gradient(180deg, #3b82f6, #2563eb);
    box-shadow: 0 1px 0 rgba(255,255,255,0.2) inset, 0 10px 30px -8px rgba(37,99,235,0.6);
    position:relative; overflow:hidden;
  }
  .btn-primary::before {
    content:''; position:absolute; top:0; left:-100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    transform: skewX(-20deg);
    animation: shineSweep 3.5s ease-in-out infinite;
  }
  @keyframes shineSweep {
    0%,40% { left: -100%; }
    100% { left: 200%; }
  }

  /* Section anchors */
  .anchor-pad { scroll-margin-top: 80px; }

  /* Verified pulse */
  .pulse-dot {
    position:relative; display:inline-block; width:8px; height:8px; border-radius:50%; background:#10b981;
  }
  .pulse-dot::before {
    content:''; position:absolute; inset:0; border-radius:50%; background:#10b981;
    animation: pulse 1.6s ease-out infinite;
  }
  @keyframes pulse { 0% { transform: scale(1); opacity:0.7; } 100% { transform: scale(2.5); opacity:0; } }

  /* Tilt 3d wrapper */
  .perspective { perspective: 1200px; }

  /* Ticker */
  .ticker-bar {
    background: linear-gradient(90deg, #0a0e1a, #101627, #0a0e1a);
    border-top: 1px solid rgba(255,255,255,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  /* hover-lift cards */
  .lift { transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s; }
  .lift:hover { transform: translateY(-4px); }

  /* ============== WHY AUTOMART (scroll-pinned, cinematic) ============== */
  .why-section { position: relative; background: #05070d; }
  .why-pin { position: sticky; top: 0; height: 100vh; overflow: hidden; }

  /* Cheap CSS atmospheric backdrop (no video decode) */
  .why-bg-css {
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 60% 50% at 30% 30%, rgba(37,99,235,0.35), transparent 60%),
      radial-gradient(ellipse 60% 50% at 75% 70%, rgba(16,185,129,0.18), transparent 60%),
      linear-gradient(180deg, #05070d 0%, #0a0e1a 50%, #05070d 100%);
    opacity: 0.95;
  }
  /* Echo panes — blurred gradient clones, no <video> */
  .echo-pane .echo-fill {
    position:absolute; inset:0; border-radius: inherit;
    background:
      radial-gradient(ellipse at 50% 35%, rgba(96,165,250,0.55), transparent 60%),
      linear-gradient(180deg, #1a2238 0%, #0a0e1a 60%, #05070d 100%);
    filter: blur(2px);
  }
  /* legacy fallback selector kept for safety */
  .why-bg-video {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover;
    filter: blur(80px) brightness(0.35) saturate(1.4);
    transform: scale(1.4);
    opacity: 0.85;
  }
  .why-grade {
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 50%, transparent 0%, rgba(5,7,13,0.85) 90%),
      linear-gradient(180deg, #05070d 0%, transparent 25%, transparent 75%, #05070d 100%),
      linear-gradient(90deg, rgba(5,7,13,0.7), transparent 30%, transparent 70%, rgba(5,7,13,0.7));
    pointer-events:none;
  }

  /* 3D tilted display stack */
  .why-stage {
    perspective: 1800px;
    perspective-origin: 50% 50%;
  }
  .why-display {
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.9s cubic-bezier(.22,.7,.2,1);
  }
  .why-pane {
    position: absolute; top: 50%; left: 50%;
    border-radius: 28px;
    overflow: hidden;
    transition: transform 0.9s cubic-bezier(.22,.7,.2,1), opacity 0.9s ease, filter 0.9s ease;
    backface-visibility: hidden;
    box-shadow:
      0 60px 120px -30px rgba(0,0,0,0.7),
      0 0 0 1px rgba(255,255,255,0.08) inset,
      0 0 60px -10px rgba(37,99,235,0.4);
  }
  .why-pane video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .why-pane .scrim {
    position:absolute; inset:0;
    background: linear-gradient(180deg, transparent 40%, rgba(5,7,13,0.5));
    pointer-events:none;
  }

  /* Center pane (sharp, tilted) */
  .why-pane.center {
    width: clamp(260px, 22vw, 340px);
    aspect-ratio: 9/16;
    transform: translate(-50%,-50%) rotateY(var(--ry,-8deg)) rotateX(2deg);
    z-index: 3;
  }
  /* Left echo */
  .why-pane.left {
    width: clamp(180px, 16vw, 240px);
    aspect-ratio: 9/16;
    transform: translate(calc(-50% - 24vw), -50%) rotateY(35deg) scale(0.85);
    opacity: 0.55;
    filter: blur(2px) brightness(0.7) saturate(1.1);
    z-index: 2;
  }
  /* Right echo */
  .why-pane.right {
    width: clamp(180px, 16vw, 240px);
    aspect-ratio: 9/16;
    transform: translate(calc(-50% + 24vw), -50%) rotateY(-35deg) scale(0.85);
    opacity: 0.55;
    filter: blur(2px) brightness(0.7) saturate(1.1);
    z-index: 2;
  }
  /* Stage variants per active card — subtle re-orientation per step */
  .why-section[data-step="0"] .why-pane.center { --ry: -10deg; }
  .why-section[data-step="1"] .why-pane.center { --ry: -5deg; }
  .why-section[data-step="2"] .why-pane.center { --ry: 0deg; }
  .why-section[data-step="3"] .why-pane.center { --ry: 6deg; }
  .why-section[data-step="4"] .why-pane.center { --ry: 11deg; }

  /* Floor reflection under center pane */
  .why-floor {
    position:absolute; bottom: 8%; left:50%;
    width: 60vw; height: 18vh;
    transform: translateX(-50%);
    background: radial-gradient(ellipse 50% 50% at 50% 0%, rgba(37,99,235,0.4), transparent 70%);
    filter: blur(40px);
    mix-blend-mode: screen;
    pointer-events:none;
  }

  /* Floating spec captions on the pane */
  .pane-tag {
    position: absolute; z-index: 4;
    display:inline-flex; align-items:center; gap:6px;
    padding: 6px 10px; border-radius: 999px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
    color: #fff;
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    white-space: nowrap;
    animation: floatY 4s ease-in-out infinite;
  }
  @keyframes floatY {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* Editorial copy area — word reveal on each card swap */
  .why-copy { position: relative; }
  .why-headline .word2 {
    display:inline-block;
    opacity:0; filter: blur(10px); transform: translateY(14px);
    animation: wordIn2 0.9s cubic-bezier(.22,.7,.2,1) forwards;
  }
  @keyframes wordIn2 {
    to { opacity:1; filter: blur(0); transform: translateY(0); }
  }

  /* Step rail (horizontal at bottom) */
  .why-steps {
    display:grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
  }
  .why-steps .seg {
    height: 3px; border-radius: 3px;
    background: rgba(255,255,255,0.1);
    overflow: hidden; position: relative;
  }
  .why-steps .seg .fill {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, #60a5fa, #2563eb);
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 0.6s cubic-bezier(.22,.7,.2,1);
  }
  .why-steps .seg.done .fill { transform: scaleX(1); }
  .why-steps .seg.active .fill { transform: scaleX(var(--p, 0)); transition: transform 0.1s linear; }
  .why-steps .label {
    margin-top: 8px;
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    transition: color 0.4s;
  }

const { useEffect, useRef, useState, useMemo } = React;

/* ------------------------------------------------------------
   Lazy / pause-when-offscreen video helper.
   - preload="metadata" so we don't pull megabytes upfront
   - IntersectionObserver pauses the video when scrolled out of
     view (huge CPU/decoder savings when several videos are on the page)
   - Optional `freezeFirstFrame` mode: shows the first decoded frame
     and never plays again. Used for the side echoes of the why-bmw
     stage so we only pay for ONE active decoder, not three.
   ------------------------------------------------------------ */
function LazyVideo({ src, freezeFirstFrame = false, eagerLoad = true, rootMargin = '400px', className, style, ...rest }) {
  const ref = useRef(null);
  useEffect(() => {
    const v = ref.current; if (!v) return;

    if (freezeFirstFrame) {
      v.preload = 'metadata';
      v.load();
      const onLoaded = () => { try { v.currentTime = 0.01; } catch(e){} };
      const onSeek = () => v.pause();
      v.addEventListener('loadedmetadata', onLoaded, { once:true });
      v.addEventListener('seeked', onSeek, { once:true });
      return;
    }

    // Start with preload="none" — only load when scrolled into view
    v.preload = 'none';

    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        if (v.preload === 'none') {
          v.preload = 'auto';
          v.load();
        }
        v.play().catch(()=>{});
      } else {
        v.pause();
      }
    }, { threshold: 0.01, rootMargin: '200px' });
    io.observe(v);
    return () => io.disconnect();
  }, [src, freezeFirstFrame]);

  return (
    <video
      ref={ref}
      src={src}
      muted
      playsInline
      autoPlay={!freezeFirstFrame}
      loop={!freezeFirstFrame}
      preload="none"
      className={className}
      style={style}
      {...rest}
    />
  );
}

/* ============================================================
   HERO — video-driven 3-stage cinematic reveal
   ============================================================ */
function Hero() {
  const videoRef = useRef(null);
  // stage 1 = video loading/black, stage 2 = video playing (text still hidden),
  // stage 3 = text reveal begins. Start at 1 so nothing is visible until video is ready.
  const [stage, setStage] = useState(1);

  useEffect(() => {
    const v = videoRef.current;
    if (!v) return;

    // Single shared timer ref — only one t3 ever fires
    let t3 = null;
    let advanced = false; // guard: once we move past stage 1, never go back

    const goStage2 = () => {
      if (advanced) return;   // already called — ignore duplicate events
      advanced = true;
      setStage(2);
      v.play().catch(()=>{});
      // Stage 3: text reveal exactly 7s after video is confirmed playing
      t3 = setTimeout(() => setStage(3), 7000);
    };

    // Primary trigger: canplaythrough = browser confident it won't rebuffer
    v.addEventListener('canplaythrough', goStage2, { once: true });

    // Fallback A: loadeddata fires earlier (first frame decoded) — use it
    // only if canplaythrough hasn't already fired
    v.addEventListener('loadeddata', goStage2, { once: true });

    // Fallback B: video file missing — show text after 9s regardless
    const tFallback = setTimeout(() => {
      if (!advanced) {
        advanced = true;
        setStage(2);
        setTimeout(() => setStage(3), 1200);
      }
    }, 9000);

    v.preload = 'auto';
    v.load();

    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) v.play().catch(()=>{});
      else v.pause();
    }, { threshold: 0.01 });
    io.observe(v);

    return () => {
      clearTimeout(t3);
      clearTimeout(tFallback);
      io.disconnect();
      v.removeEventListener('canplaythrough', goStage2);
      v.removeEventListener('loadeddata', goStage2);
    };
  }, []);

  const line1 = [{t:'Buy'},{t:'your'},{t:'next'},{t:'car'}];

        <h1 className="font-black tracking-[-0.045em] text-white text-[clamp(48px,8.5vw,128px)] leading-[0.92] drop-shadow-[0_4px_30px_rgba(0,0,0,0.5)]">
          <div>
            {line1.map((w,i) => (

function WhyAutoMart() {
  const sectionRef = useRef(null);
  const [active, setActive] = useState(0);
  const [segP, setSegP] = useState(0); // 0..1 within current step
  const total = WHY_CARDS.length;

  // Only the center pane plays — left/right echoes are static frames.
  useEffect(() => {
    const vids = Array.from(document.querySelectorAll('.why-pin .why-pane.center video'));
    const io = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) vids.forEach(v => v.play().catch(()=>{}));
        else vids.forEach(v => v.pause());
      });
    }, { threshold: 0.05 });
    if (sectionRef.current) io.observe(sectionRef.current);
    return () => io.disconnect();
  }, []);

  // rAF-throttled scroll handler — only setState when values actually change
  useEffect(() => {
    let ticking = false;
    let lastIdx = -1, lastP = -1;
    const compute = () => {
      ticking = false;
      const el = sectionRef.current;
      if (!el) return;
      const rect = el.getBoundingClientRect();
      const vh = window.innerHeight;
      const totalScroll = el.offsetHeight - vh;
      const passed = Math.min(Math.max(-rect.top, 0), totalScroll);
      const progress = totalScroll > 0 ? passed / totalScroll : 0;
      const exact = progress * total;
      const idx = Math.min(total - 1, Math.floor(exact * 0.999));
      const p = Math.min(1, Math.max(0, exact - idx));
      if (idx !== lastIdx) { lastIdx = idx; setActive(idx); }
      // Quantize segP to 5% steps to avoid render storms
      const pq = Math.round(p * 20) / 20;
      if (pq !== lastP) { lastP = pq; setSegP(pq); }
    };
    const onScroll = () => {
      if (!ticking) { ticking = true; requestAnimationFrame(compute); }
    };
    window.addEventListener('scroll', onScroll, { passive:true });
    compute();
    return () => window.removeEventListener('scroll', onScroll);
  }, [total]);

  const sectionStyle = { height: `${(total * 0.35 + 0.3) * 100}vh` };
  const card = WHY_CARDS[active];

  // Word-by-word reveal — re-key on active so it replays
  const headlineWords = useMemo(() => {
    const out = [];
    card.title.forEach((part, i) => {
      const text = typeof part === 'string' ? part : part.it;
      const italic = typeof part !== 'string';
      text.split(/(\s+)/).forEach((w, j) => {
        if (!w) return;
        if (/^\s+$/.test(w)) { out.push({sp:true}); return; }
        out.push({ w, italic });
      });
    });
    return out;
  }, [card]);

  // Body words for staggered reveal
  const bodyWords = useMemo(() => card.body.split(' '), [card]);

  return (
    <section ref={sectionRef} data-screen-label="02 Why" className="why-section" style={sectionStyle} data-step={active}>
      <div className="why-pin">
        {/* Atmospheric backdrop — CSS gradient (perf) */}
        <div className="why-bg-css"/>
        <div className="why-grade"/>

        {/* Bokeh dots */}
        {[...Array(8)].map((_,i) => (
          <span key={i} className="bokeh"
            style={{
              left: `${10 + i*11}%`,
              bottom: '-10%',
              width: 14 + (i%3)*8,
              height: 14 + (i%3)*8,
              animationDelay: `${-i*2}s`,
              animationDuration: `${16 + (i%4)*3}s`,
            }}
          />
        ))}

        <div className="why-floor"/>

        {/* SECTION HEADER */}
        <div className="absolute top-0 inset-x-0 pt-24 lg:pt-28 px-6 lg:px-10 z-30 pointer-events-none">
          <div className="max-w-[1400px] mx-auto flex items-end justify-between flex-wrap gap-4">
            <div>
              <div className="font-mono text-[11px] tracking-[0.22em] text-brand-400 uppercase">/ why automart</div>
              <h2 className="font-bold text-white text-3xl md:text-4xl xl:text-5xl mt-2 tracking-[-0.02em] leading-[1.05]">
                Five reasons. <span className="font-serif italic font-normal text-brand-300">No competition.</span>
              </h2>
            </div>
            <div className="font-mono text-[11px] tracking-widest text-white/55">
              {String(active+1).padStart(2,'0')} <span className="text-white/25">/ {String(total).padStart(2,'0')}</span> &nbsp;·&nbsp; KEEP SCROLLING
            </div>
          </div>
        </div>

        {/* 3D STAGE — three video panes */}
        <div className="absolute inset-0 why-stage z-10">
          <div className="why-display absolute inset-0">
            {/* left echo — poster image (no extra video decoder) */}
            <div className="why-pane left">
              <img src="media/why-bmw-poster.jpg" alt="" loading="lazy" decoding="async" className="absolute inset-0 w-full h-full object-cover"/>
              <div className="scrim"/>
            </div>
            {/* center hero pane — the only active video */}
            <div className="why-pane center">
              <video src="https://zthsfeivxjwenrjxykwj.supabase.co/storage/v1/object/public/marketing-media/why-bmw.mp4" autoPlay loop muted playsInline preload="none" data-lazyvideo="true" poster="media/why-bmw-poster.jpg"/>
              <div className="scrim"/>

            {/* right echo — poster image */}
            <div className="why-pane right">
              <img src="media/why-bmw-poster.jpg" alt="" loading="lazy" decoding="async" className="absolute inset-0 w-full h-full object-cover"/>
              <div className="scrim"/>
            </div>
          </div>
        </div>

        {/* EDITORIAL COPY — flanks the center video, never overlaps */}
        <div className="absolute inset-x-0 bottom-0 pb-20 lg:pb-24 px-6 lg:px-10 z-20 pointer-events-none">

            </div>
          </div>

          <div className="max-w-[1400px] mx-auto mt-10 pointer-events-auto">

// Plays a video clipped to [start, end] and loops just that window.
function LoopVideo({ src, start = 0, end, className, style }) {
  const ref = useRef(null);
  useEffect(() => {
    const v = ref.current; if (!v) return;
    let inView = true;
    const goStart = () => { try { v.currentTime = start; } catch(e){} };
    const tryPlay = () => { if (inView) v.play().catch(()=>{}); };
    const onLoaded = () => { goStart(); tryPlay(); };
    const onCanPlay = () => { tryPlay(); };
    const onTime = () => {
      const stop = (end ?? v.duration) - 0.05;
      if (v.currentTime >= stop || v.currentTime < start - 0.1) { goStart(); tryPlay(); }
    };
    v.addEventListener('loadedmetadata', onLoaded);
    v.addEventListener('canplay', onCanPlay);
    v.addEventListener('timeupdate', onTime);
    if (v.readyState >= 1) onLoaded();
    const io = new IntersectionObserver(([e]) => {
      inView = e.isIntersecting;
      if (inView) tryPlay();
      else v.pause();
    }, { threshold: 0.01 });
    io.observe(v);
    return () => {
      v.removeEventListener('loadedmetadata', onLoaded);
      v.removeEventListener('canplay', onCanPlay);
      v.removeEventListener('timeupdate', onTime);
      io.disconnect();
    };
  }, [src, start, end]);
  return (
    <video
      ref={ref}
      src={src}
      autoPlay muted playsInline preload="none" data-lazyvideo="true"
      className={className}
      style={style}
    />
  );
}

function DNAHelix({ count = 4 }) {
  // vertical helix SVG with rotating base pairs
  const H = 640;
  const W = 220;
  const cx = W/2;
  const turns = 2.2;
  const pts = 60;
  const amp = 64;
  const path = (phase) => {
    let d = '';
    for (let i = 0; i <= pts; i++) {
      const t = i / pts;
      const x = cx + Math.sin(t * Math.PI * 2 * turns + phase) * amp;
      const y = t * H;
      d += (i ? ' L ' : 'M ') + x.toFixed(1) + ' ' + y.toFixed(1);
    }
    return d;
  };
  const rungs = Array.from({length: 14}, (_, i) => {
    const t = (i + 0.5) / 14;
    const phase = 0;
    const x1 = cx + Math.sin(t * Math.PI * 2 * turns + phase) * amp;
    const x2 = cx + Math.sin(t * Math.PI * 2 * turns + phase + Math.PI) * amp;
    const y = t * H;
    return { x1, x2, y, t };
  });
  return (
    <div className="relative w-full h-full flex items-center justify-center">
      <div className="absolute inset-0" style={{background:'radial-gradient(ellipse 60% 70% at 50% 50%, rgba(16,185,129,0.15), transparent 70%)', filter:'blur(20px)'}}/>
      <svg viewBox={`0 0 ${W} ${H}`} className="relative w-full max-w-[260px] h-full" aria-hidden="true">
        <defs>
          <linearGradient id="strandA" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#10b981"/>
            <stop offset="50%" stopColor="#34d399"/>
            <stop offset="100%" stopColor="#10b981"/>
          </linearGradient>
          <linearGradient id="strandB" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#3b82f6"/>
            <stop offset="50%" stopColor="#60a5fa"/>
            <stop offset="100%" stopColor="#3b82f6"/>
          </linearGradient>
          <filter id="dnaGlow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="3"/>
          </filter>
        </defs>

        {/* glow strands */}
        <path d={path(0)} fill="none" stroke="url(#strandA)" strokeWidth="6" strokeLinecap="round" opacity="0.35" filter="url(#dnaGlow)">
          <animate attributeName="d" dur="8s" repeatCount="indefinite"
                   values={`${path(0)};${path(Math.PI/4)};${path(Math.PI/2)};${path(0.75*Math.PI)};${path(Math.PI)};${path(1.25*Math.PI)};${path(1.5*Math.PI)};${path(1.75*Math.PI)};${path(2*Math.PI)}`}/>
        </path>
        <path d={path(Math.PI)} fill="none" stroke="url(#strandB)" strokeWidth="6" strokeLinecap="round" opacity="0.35" filter="url(#dnaGlow)">
          <animate attributeName="d" dur="8s" repeatCount="indefinite"
                   values={`${path(Math.PI)};${path(1.25*Math.PI)};${path(1.5*Math.PI)};${path(1.75*Math.PI)};${path(2*Math.PI)};${path(2.25*Math.PI)};${path(2.5*Math.PI)};${path(2.75*Math.PI)};${path(3*Math.PI)}`}/>
        </path>

        {/* solid strands */}
        <path d={path(0)} fill="none" stroke="url(#strandA)" strokeWidth="2.2" strokeLinecap="round">
          <animate attributeName="d" dur="8s" repeatCount="indefinite"
                   values={`${path(0)};${path(Math.PI/4)};${path(Math.PI/2)};${path(0.75*Math.PI)};${path(Math.PI)};${path(1.25*Math.PI)};${path(1.5*Math.PI)};${path(1.75*Math.PI)};${path(2*Math.PI)}`}/>
        </path>
        <path d={path(Math.PI)} fill="none" stroke="url(#strandB)" strokeWidth="2.2" strokeLinecap="round">
          <animate attributeName="d" dur="8s" repeatCount="indefinite"
                   values={`${path(Math.PI)};${path(1.25*Math.PI)};${path(1.5*Math.PI)};${path(1.75*Math.PI)};${path(2*Math.PI)};${path(2.25*Math.PI)};${path(2.5*Math.PI)};${path(2.75*Math.PI)};${path(3*Math.PI)}`}/>
        </path>

        {/* rungs */}
        {rungs.map((r,i) => {
          const phases = ['0','PI/4','PI/2','3PI/4','PI','5PI/4','3PI/2','7PI/4','2PI'];
          const xa = phases.map(ph => {
            const v = ph==='0'?0:ph==='PI/4'?Math.PI/4:ph==='PI/2'?Math.PI/2:ph==='3PI/4'?0.75*Math.PI:ph==='PI'?Math.PI:ph==='5PI/4'?1.25*Math.PI:ph==='3PI/2'?1.5*Math.PI:ph==='7PI/4'?1.75*Math.PI:2*Math.PI;
            return (cx + Math.sin(r.t * Math.PI * 2 * turns + v) * amp).toFixed(1);
          }).join(';');
          const xb = phases.map(ph => {
            const v = ph==='0'?0:ph==='PI/4'?Math.PI/4:ph==='PI/2'?Math.PI/2:ph==='3PI/4'?0.75*Math.PI:ph==='PI'?Math.PI:ph==='5PI/4'?1.25*Math.PI:ph==='3PI/2'?1.5*Math.PI:ph==='7PI/4'?1.75*Math.PI:2*Math.PI;
            return (cx + Math.sin(r.t * Math.PI * 2 * turns + v + Math.PI) * amp).toFixed(1);
          }).join(';');
          return (
            <g key={i}>
              <line x1={r.x1} y1={r.y} x2={r.x2} y2={r.y} stroke="rgba(255,255,255,0.18)" strokeWidth="1" strokeDasharray="2 3">
                <animate attributeName="x1" dur="8s" repeatCount="indefinite" values={xa}/>
                <animate attributeName="x2" dur="8s" repeatCount="indefinite" values={xb}/>
              </line>
              <circle cx={r.x1} cy={r.y} r="3.5" fill="#10b981">
                <animate attributeName="cx" dur="8s" repeatCount="indefinite" values={xa}/>
              </circle>
              <circle cx={r.x2} cy={r.y} r="3.5" fill="#3b82f6">
                <animate attributeName="cx" dur="8s" repeatCount="indefinite" values={xb}/>
              </circle>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function App() {
  // basic scroll-reveal
  useEffect(() => {
    const els = document.querySelectorAll('.scroll-reveal');
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
    }, { threshold: 0.12 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

    <div className="bg-ink-950">

<script>
(function() {
  // Lazy-load all data-lazyvideo videos when they enter the viewport
  function initLazyVideos() {
    var videos = document.querySelectorAll('video[data-lazyvideo]');
    if (!videos.length) {
      // React hasn't rendered yet — retry in 500ms
      setTimeout(initLazyVideos, 500);
      return;
    }
    var io = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        var v = entry.target;
        if (entry.isIntersecting) {
          if (v.preload === 'none' || v.getAttribute('preload') === 'none') {
            v.preload = 'auto';
            v.load();
          }
          v.play().catch(function(){});
        } else {
          v.pause();
        }
      });
    }, { threshold: 0.05, rootMargin: '300px' });
    videos.forEach(function(v) { io.observe(v); });
  }

  // Run after React renders
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { setTimeout(initLazyVideos, 600); });
  } else {
    setTimeout(initLazyVideos, 600);
  }

  // Also handle dynamically added videos (React re-renders)
  var mo = new MutationObserver(function() {
    var unregistered = document.querySelectorAll('video[data-lazyvideo]:not([data-lazy-registered])');
    if (unregistered.length) {
      unregistered.forEach(function(v) { v.setAttribute('data-lazy-registered', '1'); });
      initLazyVideos();
    }
  });
  mo.observe(document.body || document.documentElement, { childList: true, subtree: true });
})();
</script>

<script>
document.body.addEventListener('click', function(e) {
  var el = e.target.closest('a, button');
  if (!el) return;
  // Skip elements that already have a real href
  if (el.tagName === 'A' && el.getAttribute('href') && el.getAttribute('href') !== '#') return;
  var txt = el.textContent.trim().toLowerCase();
  if (txt === 'sign in') { e.preventDefault(); location.href = '/app/login.html'; }
  else if (txt.startsWith('post a listing') || txt === 'list your car' || txt === 'sell your car') { e.preventDefault(); location.href = '/app/signup.html'; }
  else if (txt.startsWith('browse') || txt.startsWith('see all')) { e.preventDefault(); location.href = '/app/buyer/index.html'; }
  else if (txt.includes('find') && txt.includes('workshop')) { e.preventDefault(); location.href = '/app/nearby.html'; }
  else if (txt.includes('emergency')) { e.preventDefault(); location.href = '/app/emergency.html'; }
  else if (txt.includes('mechanic')) { e.preventDefault(); location.href = '/app/signup.html'; }
  else if (txt.includes('browse') && txt.includes('cars')) { e.preventDefault(); location.href = '/app/buyer/index.html'; }
});
</script>
